<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Naphegy utca 33 — 3D séta</title>
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#111;font-family:system-ui,sans-serif}
  #app{width:100%;height:100%;display:block;touch-action:none}
  #loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#111;color:#eee;z-index:10;transition:opacity .5s}
  #loader.hide{opacity:0;pointer-events:none}
  #bar{width:min(60vw,320px);height:6px;background:#333;border-radius:3px;margin-top:16px;overflow:hidden}
  #fill{height:100%;width:0%;background:#7ab8ff;border-radius:3px;transition:width .2s}
  #pct{margin-top:8px;font-size:13px;color:#999}
  #help{position:fixed;left:12px;bottom:12px;color:#ccc;background:rgba(0,0,0,.55);padding:8px 12px;border-radius:8px;font-size:12px;line-height:1.6;z-index:5;max-width:280px}
  #help b{color:#fff}
  @media (max-width:600px){#help .desktop{display:none}}
</style>
</head>
<body>
<canvas id="app"></canvas>
<div id="loader">
  <div style="font-size:18px">Naphegy utca 33 — 3D modell betöltése</div>
  <div id="bar"><div id="fill"></div></div>
  <div id="pct">0%</div>
</div>
<div id="help">
  <b>Egérrel:</b> húzás = forgatás, görgő = zoom, jobb gomb = mozgatás<br>
  <b>Mobilon:</b> egy ujj = forgatás, csípés = zoom, két ujj = mozgatás<br>
  <span class="desktop"><b>R</b> = tájolás váltása, ha fejjel lefelé állna</span>
</div>
<script type="module">
import * as pc from 'https://cdn.jsdelivr.net/npm/playcanvas@2/build/playcanvas.mjs';

// --- a szken adataiból előre kiszámolt értékek ---
const CENTER = [-0.37, -2.34, 0.68];   // modell középpontja (nyers koordináták)
const START_DIST = 7.0;

const canvas = document.getElementById('app');
const app = new pc.Application(canvas, {
  mouse: new pc.Mouse(canvas),
  touch: new pc.TouchDevice(canvas),
  keyboard: new pc.Keyboard(window),
  graphicsDeviceOptions: { antialias: false }
});
app.setCanvasFillMode(pc.FILLMODE_FILL_WINDOW);
app.setCanvasResolution(pc.RESOLUTION_AUTO);
window.addEventListener('resize', () => app.resizeCanvas());
app.start();

// kamera
const camera = new pc.Entity('cam');
camera.addComponent('camera', { clearColor: new pc.Color(0.07, 0.07, 0.08), fov: 65 });
app.root.addChild(camera);

// modell hierarchia: root (tájolás) -> offset (középre tolás) -> splat
const modelRoot = new pc.Entity('root');
const offset = new pc.Entity('offset');
offset.setLocalPosition(-CENTER[0], -CENTER[1], -CENTER[2]);
modelRoot.addChild(offset);
app.root.addChild(modelRoot);

// tájolás-változatok (R billentyű váltja, ha kell)
const ORIENTS = [[180,0,0],[0,0,0],[90,0,0],[-90,0,0],[0,0,90],[0,0,-90]];
let orient = 0;
const applyOrient = () => modelRoot.setLocalEulerAngles(...ORIENTS[orient]);
applyOrient();

// --- betöltés folyamatjelzővel ---
const fill = document.getElementById('fill'), pct = document.getElementById('pct');
const PARTS = ['chunk00', 'chunk01', 'chunk02', 'chunk03', 'chunk04', 'chunk05'];
const TOTAL_BYTES = 47951146;
async function loadParts(urls) {
  const chunks = []; let got = 0;
  for (const url of urls) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(url + ' → HTTP ' + res.status);
    const reader = res.body.getReader();
    for (;;) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value); got += value.length;
      const p = Math.round(got / TOTAL_BYTES * 100);
      fill.style.width = p + '%'; pct.textContent = p + '%';
    }
  }
  return new Blob(chunks);
}

const blob = await loadParts(PARTS);
const blobUrl = URL.createObjectURL(blob);
const asset = new pc.Asset('scene', 'gsplat', { url: blobUrl, filename: 'scene.ply' });
app.assets.add(asset);
asset.on('load', () => {
  const splat = new pc.Entity('splat');
  splat.addComponent('gsplat', { asset });
  offset.addChild(splat);
  document.getElementById('loader').classList.add('hide');
});
asset.on('error', (e) => { pct.textContent = 'Hiba: ' + e; });
app.assets.load(asset);

// --- orbit kamera vezérlés ---
let yaw = -30, pitch = -15, dist = START_DIST;
const pivot = new pc.Vec3(0, 0, 0);
const updateCam = () => {
  const qy = yaw * Math.PI / 180, qp = pitch * Math.PI / 180;
  const cp = Math.cos(qp);
  const dir = new pc.Vec3(cp * Math.sin(qy), Math.sin(qp), cp * Math.cos(qy));
  camera.setPosition(pivot.x + dir.x * dist, pivot.y + dir.y * dist, pivot.z + dir.z * dist);
  camera.lookAt(pivot);
};
updateCam();

const panBy = (dx, dy) => {
  const right = camera.right.clone().mulScalar(-dx * dist * 0.0015);
  const up = camera.up.clone().mulScalar(dy * dist * 0.0015);
  pivot.add(right).add(up);
};
const orbitBy = (dx, dy) => {
  yaw -= dx * 0.25;
  pitch = Math.max(-89, Math.min(89, pitch - dy * 0.25));
};
const zoomBy = (f) => { dist = Math.max(0.15, Math.min(60, dist * f)); };

// egér
let btn = -1;
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('pointerdown', e => { if (e.pointerType === 'mouse') { btn = e.button; canvas.setPointerCapture(e.pointerId); } });
canvas.addEventListener('pointerup', e => { if (e.pointerType === 'mouse') btn = -1; });
canvas.addEventListener('pointermove', e => {
  if (e.pointerType !== 'mouse' || btn < 0) return;
  if (btn === 0) orbitBy(e.movementX, e.movementY);
  else panBy(e.movementX, e.movementY);
  updateCam();
});
canvas.addEventListener('wheel', e => { e.preventDefault(); zoomBy(e.deltaY > 0 ? 1.1 : 0.9); updateCam(); }, { passive: false });

// érintés
const touches = new Map();
let lastPinch = 0, lastMid = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) touches.set(t.identifier, { x: t.clientX, y: t.clientY });
  if (e.touches.length === 2) {
    const [a, b] = e.touches;
    lastPinch = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    lastMid = { x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 };
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    const t = e.touches[0], p = touches.get(t.identifier);
    if (p) { orbitBy(t.clientX - p.x, t.clientY - p.y); touches.set(t.identifier, { x: t.clientX, y: t.clientY }); }
  } else if (e.touches.length === 2) {
    const [a, b] = e.touches;
    const pinch = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    const mid = { x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 };
    if (lastPinch) zoomBy(lastPinch / pinch);
    if (lastMid) panBy(mid.x - lastMid.x, mid.y - lastMid.y);
    lastPinch = pinch; lastMid = mid;
  }
  updateCam();
}, { passive: false });
canvas.addEventListener('touchend', e => {
  for (const t of e.changedTouches) touches.delete(t.identifier);
  if (e.touches.length < 2) { lastPinch = 0; lastMid = null; }
}, { passive: false });

// billentyűk: R = tájolás, WASD = mozgás
window.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') { orient = (orient + 1) % ORIENTS.length; applyOrient(); }
});
app.on('update', dt => {
  const kb = app.keyboard;
  const sp = dist * 0.8 * dt;
  const fwd = camera.forward.clone(); fwd.y = 0; fwd.normalize().mulScalar(sp);
  const right = camera.right.clone(); right.y = 0; right.normalize().mulScalar(sp);
  let moved = false;
  if (kb.isPressed(pc.KEY_W)) { pivot.add(fwd); moved = true; }
  if (kb.isPressed(pc.KEY_S)) { pivot.sub(fwd); moved = true; }
  if (kb.isPressed(pc.KEY_A)) { pivot.sub(right); moved = true; }
  if (kb.isPressed(pc.KEY_D)) { pivot.add(right); moved = true; }
  if (kb.isPressed(pc.KEY_Q)) { pivot.y -= sp; moved = true; }
  if (kb.isPressed(pc.KEY_E)) { pivot.y += sp; moved = true; }
  if (moved) updateCam();
});
</script>
</body>
</html>
